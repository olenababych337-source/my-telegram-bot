name: Run Bot 24/7
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */5 * * *'  # ← змінено з */4 на */5
  workflow_dispatch:

concurrency:
  group: bot-run
  cancel-in-progress: true  # ← змінено на true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # ← змінено з 290 на 300
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
          PARTNER_ID: ${{ secrets.PARTNER_ID }}
          LOG_CHAT_ID: ${{ secrets.LOG_CHAT_ID }}
        run: python app.py
