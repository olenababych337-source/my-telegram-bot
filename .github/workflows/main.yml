name: Run Bot 24/7
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */5 * * *'  # кожні 5 годин а не 30 хвилин
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 290  # зупиняється за 10 хвилин до наступного запуску

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
          PARTNER_ID: ${{ secrets.PARTNER_ID }}
          LOG_CHAT_ID: ${{ secrets.LOG_CHAT_ID }}
        run: python app.py
